
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>AI/ML Chatbot (FastAPI)</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="chat-container">
    <h1>AI & CS Chatbot (FastAPI)</h1>
    <div id="chat-box" class="chat-box"></div>
    <form id="chat-form" class="chat-form">
      <input id="message" autocomplete="off" placeholder="Ask me about AI, ML, Python, CS..." />
      <button type="submit">Send</button>
    </form>
  </div>
  <script>
    const chatBox = document.getElementById('chat-box');
    const chatForm = document.getElementById('chat-form');
    const messageInput = document.getElementById('message');

    function addMessage(text, cls='bot'){
      const div = document.createElement('div');
      div.className = 'message ' + cls;
      div.innerText = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage(text){
      if(!text) return;
      addMessage(text, 'user');
      messageInput.value = '';
      try{
        const res = await fetch('/chat', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({message: text})
        });
        const data = await res.json();
        addMessage(data.response, 'bot');
      } catch(e){
        addMessage('Error: could not reach server', 'bot');
      }
    }

    chatForm.addEventListener('submit', function(e){
      e.preventDefault();
      const text = messageInput.value.trim();
      if (text) sendMessage(text);
    });

    window.addEventListener('load', ()=>{ addMessage('Hello! Ask me anything about AI, ML or Computer Science.'); });
  </script>
</body>
</html>
