
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>AI/ML Chatbot (FastAPI)</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="chat-container">
    <h1>AI & CS Chatbot (FastAPI)</h1>
    <div id="chat-box" class="chat-box"></div>
    <form id="chat-form" class="chat-form" onsubmit="return sendMessage();">
      <input id="message" autocomplete="off" placeholder="Ask me about AI, ML, Python, CS..." />
      <button type="submit">Send</button>
    </form>
  </div>
  <script>
    const chatBox = document.getElementById('chat-box');
    function addMessage(text, cls='bot'){
      const div = document.createElement('div');
      div.className = 'message ' + cls;
      div.innerText = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    async function sendMessage(){
      const inp = document.getElementById('message');
      const text = inp.value.trim();
      if(!text) return false;
      addMessage(text, 'user');
      inp.value = '';
      try{
        const res = await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text})});
        const data = await res.json();
        addMessage(data.response, 'bot');
      }catch(e){
        addMessage('Error: could not reach server', 'bot');
      }
      return false;
    }
    window.addEventListener('load', ()=>{ addMessage('Hello! Ask me anything about AI, ML or Computer Science.'); });
  </script>
</body>
</html>
